name: Diagnose Gateway

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/diagnose.yml'
  workflow_dispatch: {}

env:
  GCP_PROJECT_ID: interactivebrokersquant
  GCP_WORKLOAD_IDENTITY_PROVIDER: projects/303168642265/locations/global/workloadIdentityPools/github-actions/providers/github-ibkr-gateway-main
  GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT: ibkr-gateway-deploy@interactivebrokersquant.iam.gserviceaccount.com

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
      id-token: write
    env:
      GCE_USER: ${{ vars.IB_GATEWAY_GCE_USER }}
      GCE_INSTANCE_NAME: ${{ vars.IB_GATEWAY_INSTANCE_NAME }}
      GCE_ZONE: ${{ vars.IB_GATEWAY_ZONE }}
      DEPLOY_PATH: ${{ vars.IB_GATEWAY_DEPLOY_PATH }}
      SSH_PRIVATE_KEY_SECRET_NAME: ${{ vars.IB_GATEWAY_SSH_PRIVATE_KEY_SECRET_NAME }}
    steps:
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          version: '>= 416.0.0'

      - name: Sync u18336562 TOTP secret
        env:
          TOTP_SECRET_U18336562: ${{ secrets.TOTP_SECRET_U18336562 }}
        run: |
          set -euo pipefail

          if [ -z "${TOTP_SECRET_U18336562:-}" ]; then
            echo "TOTP_SECRET_U18336562 GitHub secret is required." >&2
            exit 1
          fi
          echo "::add-mask::${TOTP_SECRET_U18336562}"
          secret_name="ib-gateway-u18336562-totp-secret"
          printf '%s' "${TOTP_SECRET_U18336562}" | gcloud secrets versions add "${secret_name}" \
            --project "${GCP_PROJECT_ID}" \
            --data-file=- >/dev/null
          echo "Synced ${secret_name} in ${GCP_PROJECT_ID}."
