name: Diagnose Gateway

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/diagnose.yml'
  workflow_dispatch:
    inputs:
      target:
        description: Gateway target (from IB_GATEWAY_TARGETS_JSON)
        required: false
        default: all
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - name: Resolve gateway targets
        id: resolve
        env:
          TARGETS_JSON: ${{ vars.IB_GATEWAY_TARGETS_JSON }}
          SELECTED_TARGET: ${{ github.event.inputs.target || 'all' }}
        run: |
          import json, os, sys

          raw = os.environ.get("TARGETS_JSON", "").strip()
          if not raw:
              raise SystemExit("IB_GATEWAY_TARGETS_JSON is required")

          loaded = json.loads(raw)
          targets = []
          if isinstance(loaded, dict):
              for name, config in loaded.items():
                  cfg = dict(config)
                  cfg["name"] = name
                  targets.append(cfg)
          elif isinstance(loaded, list):
              targets = loaded
          else:
              raise SystemExit("IB_GATEWAY_TARGETS_JSON must be an object or list")

          selected_name = os.environ.get("SELECTED_TARGET", "all")
          if selected_name == "all":
              selected = targets
          else:
              selected = [t for t in targets if t["name"] == selected_name]
              if not selected:
                  known = ", ".join(t["name"] for t in targets)
                  raise SystemExit(f"Unknown target {selected_name!r}. Known: {known}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("matrix=" + json.dumps({"target": selected}, separators=(",", ":")) + "\n")
          def masked_target(name):
              digits = "".join(char for char in str(name) if char.isdigit())
              return f"U***{digits[-4:]}" if len(digits) >= 4 else "<target>"

          print("Targets: " + ", ".join(masked_target(t["name"]) for t in selected))
        shell: python3 {0}

  diagnose:
    needs: resolve
    if: needs.resolve.outputs.matrix != '{"target":[]}'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    strategy:
      matrix: ${{ fromJson(needs.resolve.outputs.matrix) }}
      fail-fast: false
    permissions:
      contents: read
      id-token: write
    env:
      TARGET_NAME: ${{ matrix.target.name }}
      GCP_PROJECT_ID: ${{ matrix.target.gcp_project_id }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ matrix.target.gcp_workload_identity_provider }}
      GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT: ${{ matrix.target.gcp_workload_identity_service_account }}
      GCE_USER: ${{ matrix.target.gce_user }}
      GCE_INSTANCE_NAME: ${{ matrix.target.gce_instance_name }}
      GCE_ZONE: ${{ matrix.target.gce_zone }}
      DEPLOY_PATH: ${{ matrix.target.deploy_path }}
      SSH_PRIVATE_KEY_SECRET_NAME: ${{ matrix.target.ssh_private_key_secret_name }}
    steps:
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          version: '>= 416.0.0'

      - name: Prepare SSH key
        run: |
          set -euo pipefail

          if [ -z "${SSH_PRIVATE_KEY_SECRET_NAME:-}" ]; then
            echo "SSH_PRIVATE_KEY_SECRET_NAME is required." >&2
            exit 1
          fi

          install -d -m 700 "$RUNNER_TEMP/ssh"
          SSH_KEY_FILE="$RUNNER_TEMP/ssh/google_compute_engine"
          ssh_private_key="$(gcloud secrets versions access latest \
            --project "${GCP_PROJECT_ID}" \
            --secret "${SSH_PRIVATE_KEY_SECRET_NAME}")"
          printf '%s\n' "$ssh_private_key" | tr -d '\r' > "$SSH_KEY_FILE"
          chmod 600 "$SSH_KEY_FILE"
          ssh-keygen -y -f "$SSH_KEY_FILE" > "$SSH_KEY_FILE.pub"
          chmod 644 "$SSH_KEY_FILE.pub"
          echo "SSH_KEY_FILE=$SSH_KEY_FILE" >> "$GITHUB_ENV"

      - name: Collect remote diagnostics
        run: |
          set -euo pipefail

          for var_name in GCE_USER GCE_INSTANCE_NAME GCE_ZONE DEPLOY_PATH; do
            if [ -z "${!var_name:-}" ]; then
              echo "${var_name} is required." >&2
              exit 1
            fi
          done

          REMOTE_TARGET="${GCE_USER}@${GCE_INSTANCE_NAME}"
          SSH_FLAGS=(
            --project "${GCP_PROJECT_ID}"
            --zone "${GCE_ZONE}"
            --quiet
            --tunnel-through-iap
            --ssh-key-file "${SSH_KEY_FILE}"
            --ssh-flag="-o ServerAliveInterval=30"
            --ssh-flag="-o ServerAliveCountMax=4"
            --ssh-flag="-o TCPKeepAlive=yes"
          )

          REMOTE_DIAG_COMMAND=$(cat <<'EOF'
          set -euo pipefail
          cd __DEPLOY_PATH__

          section() {
            printf '\n===== %s =====\n' "$1"
          }

          section "safe env"
          if [ -f .env ]; then
            grep -E '^(TRADING_MODE|ACCEPT_API_FROM_IP|ALLOW_CONNECTIONS_FROM_LOCALHOST_ONLY|TWS_ACCEPT_INCOMING|READ_ONLY_API|TWOFA_TIMEOUT_ACTION|RELOGIN_AFTER_TWOFA_TIMEOUT|EXISTING_SESSION_DETECTED_ACTION|LOGIN_TIMEOUT|JAVA_HEAP_SIZE)=' .env || true
          else
            echo ".env missing"
          fi

          section "clock"
          date -u || true
          sudo docker exec ib-gateway bash -lc 'date -u || true' || true
          sudo docker exec ib-gateway bash -lc 'python3 - <<'"'"'PY'"'"'
          import os
          import time

          print("container_epoch", int(time.time()))
          if os.environ.get("TOTP_SECRET"):
              print("totp_seconds_remaining", 30 - (int(time.time()) % 30))
          else:
              print("totp_secret_present", False)
          PY' || true

          section "docker compose ps"
          sudo docker compose ps || true

          section "host listening ports"
          sudo ss -ltnp | grep -E ':(4001|4002|4003|4004|5900)\b' || true

          section "2fa watcher systemd"
          sudo systemctl status ibkr-2fa-bot.timer ibkr-2fa-bot.service --no-pager || true

          section "2fa watcher journal"
          sudo journalctl -u ibkr-2fa-bot.service -n 100 --no-pager || true

          section "container processes"
          sudo docker exec ib-gateway bash -lc 'pgrep -a -f "2fa_bot.py|ibgateway|socat|Xvfb|x11vnc|ibcstart" || true' || true

          section "container listening ports"
          sudo docker exec ib-gateway bash -lc 'ss -ltnp 2>/dev/null | grep -E ":(4001|4002|4003|4004|5900)\b" || netstat -ltnp 2>/dev/null | grep -E ":(4001|4002|4003|4004|5900)\b" || true' || true

          section "x11 windows"
          sudo docker exec ib-gateway bash -lc '
            export DISPLAY=:1
            ids=$(xdotool search --name ".*" 2>/dev/null || true)
            if [ -z "$ids" ]; then
              echo "no x11 windows found"
            else
              for id in $ids; do
                printf "%s " "$id"
                xdotool getwindowname "$id" 2>/dev/null || true
                timeout 3 xdotool getwindowgeometry --shell "$id" 2>/dev/null || true
                timeout 3 xprop -id "$id" WM_NAME WM_CLASS WM_WINDOW_ROLE 2>/dev/null || true
              done
            fi
            focused=$(xdotool getwindowfocus 2>/dev/null || true)
            if [ -n "$focused" ]; then
              printf "focused %s " "$focused"
              xdotool getwindowname "$focused" 2>/dev/null || true
            fi
          ' || true

          section "2fa bot log"
          sudo docker exec ib-gateway bash -lc 'tail -n 160 /home/ibgateway/2fa.log 2>/dev/null || echo "2fa.log missing"' || true

          section "ib gateway docker log"
          sudo docker logs --tail 220 ib-gateway 2>&1 || true
          EOF
          )
          deploy_path_quoted="$(printf '%q' "${DEPLOY_PATH}")"
          REMOTE_DIAG_COMMAND="${REMOTE_DIAG_COMMAND/__DEPLOY_PATH__/${deploy_path_quoted}}"

          redact_diagnostics() {
            python3 -c '
          import re
          import sys

          account_pattern = re.compile(r"(?i)\b(DU|U|F)(\d{4,})\b")
          email_pattern = re.compile(r"\b[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}\b", re.IGNORECASE)
          ipv4_pattern = re.compile(r"(?<![\d.])(?:\d{1,3}\.){3}\d{1,3}(?![\d.])")
          sensitive_assignment_pattern = re.compile(
              r"(?i)\b([A-Z0-9_]*(?:PASSWORD|SECRET|TOKEN|COOKIE|AUTHORIZATION)[A-Z0-9_]*)"
              r"(\s*[:=]\s*).*$"
          )
          security_code_pattern = re.compile(r"(?i)(\bsecurity\s+code\s*[:=]\s*).*$")

          for line in sys.stdin:
              line = account_pattern.sub(
                  lambda match: f"{match.group(1).upper()}***{match.group(2)[-4:]}",
                  line,
              )
              line = email_pattern.sub("<EMAIL>", line)
              line = ipv4_pattern.sub("<IP>", line)
              line = sensitive_assignment_pattern.sub(r"\1\2<REDACTED>\n", line)
              line = security_code_pattern.sub(r"\1<REDACTED>\n", line)
              sys.stdout.write(line)
          '
          }

          # Keep SSH/authentication failures visible even though output is filtered.
          set -o pipefail
          gcloud compute ssh "${REMOTE_TARGET}" "${SSH_FLAGS[@]}" --command "${REMOTE_DIAG_COMMAND}" 2>&1 \
            | redact_diagnostics
