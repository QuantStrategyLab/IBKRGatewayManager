name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run shell tests
        run: |
          set -euo pipefail
          bash tests/test_install_2fa_bot_watcher.sh
          bash tests/test_workflow_shared_config.sh
          bash tests/test_docker_compose_ports.sh
