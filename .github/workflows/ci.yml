name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run shell tests
        run: |
          set -euo pipefail
          for test_file in tests/*.sh; do
            echo "== ${test_file} =="
            bash "${test_file}"
          done
