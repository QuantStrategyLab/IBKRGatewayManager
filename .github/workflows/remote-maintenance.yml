name: Remote Gateway Maintenance

on:
  workflow_dispatch:
    inputs:
      action:
        description: Maintenance action to run on the gateway VM
        required: true
        default: stop-2fa-bot
        type: choice
        options:
          - stop-2fa-bot
          - restart-2fa-bot
          - stop-gateway
          - restart-gateway
          - status

env:
  GCP_PROJECT_ID: interactivebrokersquant
  GCP_WORKLOAD_IDENTITY_PROVIDER: projects/303168642265/locations/global/workloadIdentityPools/github-actions/providers/github-ibkr-gateway-main
  GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT: ibkr-gateway-deploy@interactivebrokersquant.iam.gserviceaccount.com

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
      id-token: write
    env:
      GCE_USER: ${{ vars.IB_GATEWAY_GCE_USER }}
      GCE_INSTANCE_NAME: ${{ vars.IB_GATEWAY_INSTANCE_NAME }}
      GCE_ZONE: ${{ vars.IB_GATEWAY_ZONE }}
      DEPLOY_PATH: ${{ vars.IB_GATEWAY_DEPLOY_PATH }}
      IB_GATEWAY_MODE: ${{ vars.IB_GATEWAY_MODE }}
      SSH_PRIVATE_KEY_SECRET_NAME: ${{ vars.IB_GATEWAY_SSH_PRIVATE_KEY_SECRET_NAME }}
      MAINTENANCE_ACTION: ${{ github.event.inputs.action }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          version: '>= 416.0.0'

      - name: Prepare SSH key
        run: |
          set -euo pipefail

          if [ -z "${SSH_PRIVATE_KEY_SECRET_NAME:-}" ]; then
            echo "SSH_PRIVATE_KEY_SECRET_NAME is required." >&2
            exit 1
          fi

          install -d -m 700 "$RUNNER_TEMP/ssh"
          SSH_KEY_FILE="$RUNNER_TEMP/ssh/google_compute_engine"
          ssh_private_key="$(gcloud secrets versions access latest \
            --project "${GCP_PROJECT_ID}" \
            --secret "${SSH_PRIVATE_KEY_SECRET_NAME}")"
          printf '%s\n' "$ssh_private_key" | tr -d '\r' > "$SSH_KEY_FILE"
          chmod 600 "$SSH_KEY_FILE"
          ssh-keygen -y -f "$SSH_KEY_FILE" > "$SSH_KEY_FILE.pub"
          chmod 644 "$SSH_KEY_FILE.pub"
          echo "SSH_KEY_FILE=$SSH_KEY_FILE" >> "$GITHUB_ENV"

      - name: Run maintenance action
        run: |
          set -euo pipefail

          for var_name in GCE_USER GCE_INSTANCE_NAME GCE_ZONE DEPLOY_PATH; do
            if [ -z "${!var_name:-}" ]; then
              echo "${var_name} is required." >&2
              exit 1
            fi
          done

          REMOTE_TARGET="${GCE_USER}@${GCE_INSTANCE_NAME}"
          SSH_FLAGS=(
            --project "${GCP_PROJECT_ID}"
            --zone "${GCE_ZONE}"
            --quiet
            --tunnel-through-iap
            --ssh-key-file "${SSH_KEY_FILE}"
            --ssh-flag="-o ServerAliveInterval=30"
            --ssh-flag="-o ServerAliveCountMax=4"
            --ssh-flag="-o TCPKeepAlive=yes"
          )
          deploy_path_quoted="$(printf '%q' "${DEPLOY_PATH}")"
          gateway_mode_quoted="$(printf '%q' "${IB_GATEWAY_MODE:-paper}")"

          case "${MAINTENANCE_ACTION}" in
            stop-2fa-bot)
              REMOTE_COMMAND=$(cat <<'EOF'
          set -euo pipefail
          sudo systemctl stop ibkr-2fa-bot.timer ibkr-2fa-bot.service 2>/dev/null || true
          sudo docker exec ib-gateway pkill -f 2fa_bot.py 2>/dev/null || true
          sudo docker exec ib-gateway pgrep -a -f 2fa_bot.py 2>/dev/null || echo "2FA bot stopped"
          sudo systemctl status ibkr-2fa-bot.timer ibkr-2fa-bot.service --no-pager || true
          EOF
              )
              ;;
            restart-2fa-bot)
              REMOTE_COMMAND=$(cat <<'EOF'
          set -euo pipefail
          sudo docker exec ib-gateway pkill -f 2fa_bot.py 2>/dev/null || true
          sudo /usr/local/bin/ensure-ibkr-2fa-bot-running
          sudo docker exec ib-gateway pgrep -a -f 2fa_bot.py
          sudo docker exec ib-gateway tail -n 40 /home/ibgateway/2fa.log 2>/dev/null || true
          EOF
              )
              ;;
            stop-gateway)
              REMOTE_COMMAND=$(cat <<'EOF'
          set -euo pipefail
          cd __DEPLOY_PATH__
          sudo systemctl disable --now \
            ibkr-gateway-healthcheck.timer ibkr-gateway-healthcheck.service \
            ibkr-gateway-daily-restart.timer ibkr-gateway-daily-restart.service \
            ibkr-2fa-bot.timer ibkr-2fa-bot.service 2>/dev/null || true
          sudo docker exec ib-gateway pkill -f 2fa_bot.py 2>/dev/null || true
          sudo docker update --restart=no ib-gateway 2>/dev/null || true
          sudo docker compose down
          sudo docker compose ps
          EOF
              )
              ;;
            restart-gateway)
              REMOTE_COMMAND=$(cat <<'EOF'
          set -euo pipefail
          cd __DEPLOY_PATH__
          sudo systemctl stop ibkr-gateway-healthcheck.timer ibkr-gateway-healthcheck.service 2>/dev/null || true
          sudo systemctl stop ibkr-gateway-daily-restart.timer ibkr-gateway-daily-restart.service 2>/dev/null || true
          sudo docker compose up -d --no-build ib-gateway
          sudo bash ./scripts/install_2fa_bot_watcher.sh
          sudo bash ./scripts/recover_ib_gateway_ready.sh __IB_GATEWAY_MODE__
          sudo bash ./scripts/install_gateway_health_watcher.sh __IB_GATEWAY_MODE__
          sudo docker compose ps
          EOF
              )
              ;;
            status)
              REMOTE_COMMAND=$(cat <<'EOF'
          set -euo pipefail
          cd __DEPLOY_PATH__
          sudo docker compose ps
          sudo systemctl status ibkr-gateway-healthcheck.timer ibkr-gateway-daily-restart.timer ibkr-2fa-bot.timer --no-pager || true
          sudo docker exec ib-gateway pgrep -a -f "2fa_bot.py|ibgateway|socat|Xvfb|x11vnc|ibcstart" 2>/dev/null || true
          sudo docker exec ib-gateway bash -lc 'ss -ltnp 2>/dev/null | grep -E ":(4001|4002|4003|4004|5900)\b" || true' || true
          sudo docker exec ib-gateway tail -n 80 /home/ibgateway/2fa.log 2>/dev/null || true
          EOF
              )
              ;;
            *)
              echo "Unsupported maintenance action: ${MAINTENANCE_ACTION}" >&2
              exit 1
              ;;
          esac
          REMOTE_COMMAND="${REMOTE_COMMAND//__DEPLOY_PATH__/${deploy_path_quoted}}"
          REMOTE_COMMAND="${REMOTE_COMMAND//__IB_GATEWAY_MODE__/${gateway_mode_quoted}}"

          gcloud compute ssh "${REMOTE_TARGET}" "${SSH_FLAGS[@]}" --command "${REMOTE_COMMAND}"
